services:
  mysql:
    image: mysql:8.0
    container_name: rces-mysql
    env_file:
      - mysql.env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect="SET NAMES utf8mb4"
      - --skip-character-set-client-handshake
    networks:
      - rces_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  spring-app:
    image: gradle:7.6-jdk17
    container_name: rces-app
    ports:
      - "192.168.0.67:2520:2520"
    env_file:
      - app.env
    volumes:
      - .:/app
      - gradle-cache:/home/gradle/.gradle
    working_dir: /app
    command: sh -c "gradle clean bootWar -x test && java -jar build/libs/RCES.war"
    networks:
      - rces_network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: rces-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - .:/workspace
    networks:
      - rces_network
    restart: unless-stopped
    user: root

volumes:
  mysql_data:
  gradle-cache:
  jenkins_home:

networks:
  rces_network:
    driver: bridge